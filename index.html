<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>رابط CRM | منصة إدارة علاقات العملاء SaaS</title>
  <meta name="description" content="رابط CRM — منصة إدارة علاقات العملاء SaaS للشركات السعودية" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="layout-crm">
  <div id="app" class="shell shell-crm">
    <aside class="icon-rail" id="nav" aria-label="القائمة الرئيسية"></aside>
    <div class="crm-main">
      <header class="crm-banner">
        <div class="banner-text">
          <span class="banner-label">رابط CRM</span>
          <h2 id="page-title" class="banner-title"></h2>
          <p id="page-sub" class="banner-sub"></p>
        </div>
        <div class="banner-actions">
          <label class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            <input type="search" id="global-search" placeholder="بحث..." />
          </label>
          <select id="role-select" class="select select-compact">
            <option value="manager">مدير المبيعات</option>
            <option value="rep">مندوب مبيعات</option>
            <option value="admin">مسؤول النظام</option>
          </select>
          <button type="button" class="icon-btn" id="notif-btn" aria-label="الإشعارات">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
            <span class="badge-count">6</span>
          </button>
          <div class="profile">
            <div class="profile-avatar">س.ع</div>
            <div class="profile-info">
              <strong>سارة العبدالله</strong>
              <span id="profile-role">مدير المبيعات</span>
            </div>
          </div>
        </div>
      </header>
      <nav class="breadcrumb-bar" id="breadcrumb" aria-label="مسار التنقل"></nav>
      <main id="view" class="content"></main>
      <footer class="app-footer">
        <span>رابط CRM — حلول المبيعات B2B</span>
        <span class="num">v2.4.0</span>
        <span class="footer-note">بيانات وهمية — أسماء شركات افتراضية</span>
      </footer>
    </div>
  </div>
  <div id="toast" class="toast" role="status" hidden></div>
  <div id="modal-root"></div>
  <script src="js/utils.js"></script>
  <script src="js/mock-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
